<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 추천 서비스 - 일일 리포트</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f1419;
            --card: #1a2332;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 24px;
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        h1 { font-size: 1.75rem; font-weight: 700; margin: 0; color: var(--text); }
        .report-date { color: var(--muted); font-size: 0.95rem; }
        
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .card h2 { font-size: 1.15rem; margin: 0 0 20px 0; color: var(--accent); }
        
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .market-item {
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        .market-item .label { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
        .market-item .value { font-size: 1.5rem; font-weight: 600; }
        .market-item .change { font-size: 0.9rem; }
        .market-item .change.up { color: var(--green); }
        .market-item .change.down { color: var(--red); }
        
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .stock-card {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
        }
        .stock-card h3 { margin: 0 0 8px 0; font-size: 1rem; }
        .stock-card .ticker { color: var(--muted); font-size: 0.8rem; margin-bottom: 12px; }
        .stock-card .price { font-size: 1.25rem; font-weight: 600; }
        .stock-card:hover {
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 1px rgba(88,166,255,0.5);
            transform: translateY(-1px);
        }
        .stock-card .segment-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.7rem;
            margin-bottom: 6px;
            background: rgba(88,166,255,0.15);
            color: var(--accent);
        }
        .stock-card .reason { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
        .stock-card .targets {
            margin-top: 12px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            font-size: 0.8rem;
        }
        .stock-card .targets .row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .stock-card .targets .row:last-child { margin-bottom: 0; }
        .stock-card .targets .label { color: var(--muted); }
        .stock-card .targets .val.up { color: var(--green); }
        .stock-card .targets .val.down { color: var(--red); }
        .stock-card .details {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed rgba(255,255,255,0.12);
            font-size: 0.78rem;
            display: none;
        }
        .stock-card .details-title {
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }
        .stock-card .details ul {
            list-style: none;
            padding-left: 0;
            margin: 4px 0 0 0;
        }
        .stock-card .details li {
            margin-bottom: 3px;
        }
        .stock-card .details a {
            color: var(--accent);
            text-decoration: none;
        }
        .stock-card .details a:hover {
            text-decoration: underline;
        }
        .stock-card canvas { height: 120px !important; margin-top: 12px; }
        
        .news-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        @media (max-width: 900px) { .news-grid { grid-template-columns: 1fr; } }
        .news-list { list-style: none; padding: 0; margin: 0; }
        .news-list li {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .news-list li:last-child { border-bottom: none; }
        .news-list a { color: var(--accent); text-decoration: none; }
        .news-list a:hover { text-decoration: underline; }
        .news-list .source { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
        
        .chart-container { position: relative; height: 300px; margin-top: 20px; }
        .loading { text-align: center; padding: 40px; color: var(--muted); }
        .btn { 
            background: var(--accent); 
            color: #fff; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn:hover { opacity: 0.9; }
        .data-delay-banner {
            background: rgba(248,81,73,0.15);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .confidence-badge { font-size:0.7rem; color:var(--green); margin-left:6px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="dataDelayBanner" class="data-delay-banner" style="display:none;">
            ⚠️ 데이터 지연: <span id="dataDelayMinutes">--</span>분 | 출처: <span id="dataSource">--</span> | 실시간 아님
        </div>
        <header>
            <div>
                <h1>📊 주식 추천 서비스</h1>
                <p class="report-date">일일 리포트 · <span id="reportDate">--</span> · <span id="nextRefresh" style="color:var(--muted)"></span></p>
            </div>
            <button class="btn" onclick="loadReport()">🔄 새로고침</button>
        </header>

        <section class="card">
            <h2>시장 현황</h2>
            <div class="market-grid" id="marketOverview">
                <div class="loading">로딩 중...</div>
            </div>
        </section>

        <section class="card">
            <h2>오늘의 일일 단타 추천 종목 <span style="font-size:0.75rem;font-weight:normal;color:var(--muted)">(우량주·소형주 상승예측, 클릭 시 근거·출처)</span></h2>
            <div class="stock-grid" id="recommendedStocks">
                <div class="loading">로딩 중...</div>
            </div>
        </section>

        <section class="card">
            <h2>뉴스 · 시사</h2>
            <div class="news-grid">
                <div>
                    <h3 style="font-size:1rem;margin-bottom:12px;">🇰🇷 국내</h3>
                    <ul class="news-list" id="domesticNews"></ul>
                </div>
                <div>
                    <h3 style="font-size:1rem;margin-bottom:12px;">🌐 해외</h3>
                    <ul class="news-list" id="internationalNews"></ul>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = '';
        const REFRESH_INTERVAL_MS = 30 * 60 * 1000; // 30분
        let refreshTimer = null;
        let countdownInterval = null;
        
        async function loadReport() {
            try {
                const res = await fetch(`${API_BASE}/api/reports`);
                const data = await res.json();
                renderReport(data);
                scheduleRefresh();
                startCountdown();
            } catch (e) {
                console.error(e);
                document.getElementById('marketOverview').innerHTML = '<div class="loading">데이터 로딩 실패</div>';
            }
        }

        function renderReport(data) {
            document.getElementById('reportDate').textContent = `${data.report_date} ${data.report_time}`;
            
            // 데이터 지연 경고
            const meta = data.data_meta || data.market_overview?.data_meta;
            const banner = document.getElementById('dataDelayBanner');
            if (meta) {
                const dm = document.getElementById('dataDelayMinutes');
                const ds = document.getElementById('dataSource');
                if (dm) dm.textContent = meta.delay_minutes ?? '--';
                if (ds) ds.textContent = meta.source ?? '--';
                banner.style.display = (meta.is_delayed || (meta.delay_minutes || 0) > 15) ? 'block' : 'none';
            } else {
                banner.style.display = 'none';
            }
            
            // 시장 현황
            const m = data.market_overview || {};
            document.getElementById('marketOverview').innerHTML = `
                <div class="market-item">
                    <div class="label">KOSPI</div>
                    <div class="value">${m.kospi?.value?.toLocaleString() ?? '-'}</div>
                    <div class="change ${m.kospi?.change >= 0 ? 'up' : 'down'}">
                        ${m.kospi?.change >= 0 ? '+' : ''}${m.kospi?.change?.toFixed(2) ?? '-'} (${m.kospi?.change_pct >= 0 ? '+' : ''}${m.kospi?.change_pct?.toFixed(2) ?? '-'}%)
                    </div>
                </div>
                <div class="market-item">
                    <div class="label">KOSDAQ</div>
                    <div class="value">${m.kosdaq?.value?.toLocaleString() ?? '-'}</div>
                    <div class="change ${m.kosdaq?.change >= 0 ? 'up' : 'down'}">
                        ${m.kosdaq?.change >= 0 ? '+' : ''}${m.kosdaq?.change?.toFixed(2) ?? '-'} (${m.kosdaq?.change_pct >= 0 ? '+' : ''}${m.kosdaq?.change_pct?.toFixed(2) ?? '-'}%)
                    </div>
                </div>
            `;

            // 추천 종목
            const stocksEl = document.getElementById('recommendedStocks');
            const all = data.recommended_stocks || [];
            stocksEl.innerHTML = all.map(s => `
                <div class="stock-card" onclick="toggleDetails('${s.ticker}')">
                    <h3>${s.name}</h3>
                    <div class="ticker">${s.ticker} · ${s.market}</div>
                    <div class="segment-badge">
                        ${s.segment === 'smallcap' ? '소형주 (5만원↓)' : '우량주 (5만원↑)'}
                    </div>
                    ${s.confidence_score != null ? `<span class="confidence-badge">확신도 ${s.confidence_score}%</span>` : ''}
                    <div class="price">
                        ${s.close?.toLocaleString() ?? '-'}원
                        <span class="${s.change_pct >= 0 ? 'up' : 'down'}" style="font-size:0.9rem;margin-left:8px;">
                            ${s.change_pct >= 0 ? '+' : ''}${s.change_pct?.toFixed(2) ?? '-'}%
                        </span>
                    </div>
                    <div class="reason">${s.explainable_reason || s.reason || '-'}</div>
                    ${(s.targets && s.targets.target_buy) ? `
                    <div class="targets">
                        <div class="row"><span class="label">매수가</span><span>${(s.targets.target_buy||0).toLocaleString()}원</span></div>
                        <div class="row"><span class="label">목표매도</span><span class="val up">${(s.targets.target_sell||0).toLocaleString()}원 (+${s.targets.expect_return_pct||0}%)</span></div>
                        <div class="row"><span class="label">손절가</span><span class="val down">${(s.targets.stop_loss||0).toLocaleString()}원 ${s.targets.stop_loss_type ? '('+s.targets.stop_loss_type+')' : ''}</span></div>
                        <div class="row"><span class="label">지지/저항</span><span>${(s.targets.support||0).toLocaleString()} / ${(s.targets.resistance||0).toLocaleString()}</span></div>
                    </div>
                    ` : ''}
                    <div class="details" id="details-${s.ticker}">
                        <div class="details-title">근거 자료 & 출처 (Explainable Quant)</div>
                        <div style="margin-top:6px;">${s.explainable_reason || '-'}</div>
                        <div style="margin-top:6px;">▸ 출처: Yahoo Finance, KRX/PyKRX | 손절: ${s.targets?.stop_loss_type || '정보 부족'}</div>
                        <div style="margin-top:4px;">▸ 관련 뉴스 (감성 포함):</div>
                        <ul>
                            ${(s.related_news || []).map(n => `
                                <li><a href="${n.link || '#'}" target="_blank">${n.title}</a> <span style="color:var(--muted)">(${n.source || '뉴스'} ${n.sentiment ? '· '+n.sentiment : ''})</span></li>
                            `).join('') || '<li>관련 뉴스 없음</li>'}
                        </ul>
                    </div>
                    <canvas id="chart-${s.ticker}" width="280" height="120"></canvas>
                </div>
            `).join('');

            // 차트
            (data.recommended_stocks || []).forEach(s => {
                fetchChart(s.ticker);
            });

            // 뉴스
            const domEl = document.getElementById('domesticNews');
            domEl.innerHTML = (data.domestic_news || []).map(n => `
                <li><a href="${n.link}" target="_blank">${n.title}</a><div class="source">${n.source || '국내'}</div></li>
            `).join('') || '<li>뉴스 없음</li>';

            const intEl = document.getElementById('internationalNews');
            intEl.innerHTML = (data.international_news || []).map(n => `
                <li><a href="${n.link}" target="_blank">${n.title}</a><div class="source">${n.source || '해외'}</div></li>
            `).join('') || '<li>뉴스 없음</li>';
        }

        function scheduleRefresh() {
            if (refreshTimer) clearTimeout(refreshTimer);
            refreshTimer = setTimeout(() => {
                loadReport();
            }, REFRESH_INTERVAL_MS);
        }
        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            let secLeft = Math.floor(REFRESH_INTERVAL_MS / 1000);
            const el = document.getElementById('nextRefresh');
            if (!el) return;
            el.textContent = `다음 갱신까지 ${Math.floor(secLeft/60)}분`;
            countdownInterval = setInterval(() => {
                secLeft -= 1;
                if (secLeft <= 0) {
                    clearInterval(countdownInterval);
                    el.textContent = '갱신 중...';
                    return;
                }
                el.textContent = `다음 갱신까지 ${Math.floor(secLeft/60)}분 ${secLeft%60}초`;
            }, 1000);
        }
        function toggleDetails(ticker) {
            const el = document.getElementById(`details-${ticker}`);
            if (!el) return;
            el.style.display = el.style.display === 'none' || !el.style.display ? 'block' : 'none';
        }

        async function fetchChart(ticker) {
            try {
                const res = await fetch(`${API_BASE}/api/stocks/${ticker}/chart?days=60`);
                const data = await res.json();
                if (!data || data.length === 0) return;
                
                const ctx = document.getElementById(`chart-${ticker}`);
                if (!ctx) return;

                new Chart(ctx.getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.date),
                        datasets: [{
                            label: '종가',
                            data: data.map(d => d.close),
                            borderColor: '#58a6ff',
                            backgroundColor: 'rgba(88,166,255,0.1)',
                            fill: true,
                            tension: 0.2,
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: true, ticks: { maxTicksLimit: 6 } },
                            y: { display: true, ticks: { callback: v => v?.toLocaleString() } }
                        }
                    }
                });
            } catch (e) { console.warn('Chart load fail:', ticker, e); }
        }

        loadReport();
    </script>
</body>
</html>
